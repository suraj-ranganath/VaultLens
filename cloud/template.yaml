AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Cost-effective Telegram webhook deployment for VaultLens.

Parameters:
  CodexAccessToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Codex access token used by the Codex Python SDK agent.
  CodexAuthS3Key:
    Type: String
    Default: codex-auth/auth.json
    Description: S3 key for Pro/Plus Codex ChatGPT auth.json fallback in the private vault state bucket.
  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: Telegram bot token.
  TelegramWebhookSecret:
    Type: String
    NoEcho: true
    Description: Random secret passed to Telegram setWebhook and validated on every webhook call.
  TelegramAllowedChatIds:
    Type: String
    Default: ""
    Description: Optional comma-separated Telegram chat IDs allowed to use the bot.
  GoogleWorkspaceCliCredentialsJson:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional exported Google Workspace CLI credentials JSON used by calendar actions.
  VaultCalendarId:
    Type: String
    Default: primary
    Description: Google Calendar ID used by Telegram calendar actions and morning briefs.
  VaultCodexModel:
    Type: String
    Default: auto
    Description: Codex model used by the Telegram routing and query agents. Use auto to pick the best visible top-level model.
  VaultAgentReasoningEffort:
    Type: String
    Default: medium
    AllowedValues:
      - low
      - medium
      - high
      - xhigh
  ProcessorMemoryMb:
    Type: Number
    Default: 1024
    MinValue: 512
    MaxValue: 4096
  ReceiverMemoryMb:
    Type: Number
    Default: 512
    MinValue: 128
    MaxValue: 1024
  HeartbeatEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable scheduled vault heartbeat surfacing.
  TelegramHeartbeatChatId:
    Type: String
    Default: ""
    Description: Telegram chat ID that should receive heartbeat alerts when enabled.
  HeartbeatSchedule:
    Type: String
    Default: cron(0 9 * * ? *)
    Description: EventBridge Scheduler expression for the focused daily morning brief.
  HeartbeatScheduleTimezone:
    Type: String
    Default: America/Los_Angeles
    Description: Timezone used by the focused daily morning brief schedule.

Conditions:
  EnableHeartbeat: !Equals [!Ref HeartbeatEnabled, "true"]

Globals:
  Function:
    Architectures:
      - arm64
    Environment:
      Variables:
        CODEX_ACCESS_TOKEN: !Ref CodexAccessToken
        TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
        TELEGRAM_ALLOWED_CHAT_IDS: !Ref TelegramAllowedChatIds
        TELEGRAM_WEBHOOK_SECRET: !Ref TelegramWebhookSecret
        GOOGLE_WORKSPACE_CLI_CREDENTIALS_JSON: !Ref GoogleWorkspaceCliCredentialsJson
        VAULT_CODEX_AUTH_S3_KEY: !Ref CodexAuthS3Key
        VAULT_CALENDAR_ID: !Ref VaultCalendarId
        VAULT_CODEX_MODEL: !Ref VaultCodexModel
        VAULT_AGENT_MODEL: !Ref VaultCodexModel
        VAULT_AGENT_REASONING_EFFORT: !Ref VaultAgentReasoningEffort
        VAULT_STATE_BUCKET: !Ref VaultStateBucket
        VAULT_STATE_PREFIX: state
        VAULT_WEBHOOK_EVENTS_PREFIX: webhook-events
        TELEGRAM_HEARTBEAT_CHAT_ID: !Ref TelegramHeartbeatChatId
        TELEGRAM_SESSION_NAME: telegram-live

Resources:
  VaultStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireWebhookEventBackups
            Status: Enabled
            Prefix: webhook-events/
            ExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ReceiverFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: cloud/Dockerfile
      DockerContext: ..
      DockerTag: vault-telegram-webhook
    Properties:
      PackageType: Image
      Timeout: 15
      MemorySize: !Ref ReceiverMemoryMb
      Environment:
        Variables:
          VAULT_LAMBDA_MODE: receiver
          VAULT_PROCESSOR_FUNCTION_NAME: !Ref ProcessorFunction
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref VaultStateBucket
        - LambdaInvokePolicy:
            FunctionName: !Ref ProcessorFunction

  ProcessorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: cloud/Dockerfile
      DockerContext: ..
      DockerTag: vault-telegram-processor
    Properties:
      PackageType: Image
      Timeout: 900
      MemorySize: !Ref ProcessorMemoryMb
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          VAULT_LAMBDA_MODE: processor
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref VaultStateBucket

  HeartbeatSchedulerRole:
    Type: AWS::IAM::Role
    Condition: EnableHeartbeat
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeVaultMorningBriefProcessor
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt ProcessorFunction.Arn

  HeartbeatDailySchedule:
    Type: AWS::Scheduler::Schedule
    Condition: EnableHeartbeat
    Properties:
      Description: Focused daily vault morning brief.
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref HeartbeatSchedule
      ScheduleExpressionTimezone: !Ref HeartbeatScheduleTimezone
      State: ENABLED
      Target:
        Arn: !GetAtt ProcessorFunction.Arn
        RoleArn: !GetAtt HeartbeatSchedulerRole.Arn
        Input: '{"vaultHeartbeat": true}'

  ReceiverFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ReceiverFunction.Arn

  ReceiverFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref ReceiverFunction
      FunctionUrlAuthType: NONE
      Principal: "*"

  ReceiverFunctionUrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ReceiverFunction
      InvokedViaFunctionUrl: true
      Principal: "*"

Outputs:
  ReceiverFunctionUrl:
    Description: Telegram webhook endpoint. Use this URL in setWebhook.
    Value: !GetAtt ReceiverFunctionUrl.FunctionUrl
  VaultStateBucketName:
    Description: S3 bucket that stores ignored vault data for the cloud worker.
    Value: !Ref VaultStateBucket
  ProcessorFunctionName:
    Description: Single-concurrency worker that runs the Codex-backed vault pipeline.
    Value: !Ref ProcessorFunction
