name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          uv sync --locked

      - name: Python tests
        run: bun run test

      - name: Python compile check
        run: uv run python -m py_compile tools/*.py cloud/*.py

      - name: JavaScript syntax check
        run: |
          for file in tools/*.mjs cloud/*.js; do
            node --check "$file"
          done
